name: Bug report
description: Report a reproducible problem in MeshtasticForeman
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail for someone else to reproduce it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Short description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, starting from a known state
      placeholder: |
        1. Start the app with ...
        2. Open ...
        3. Click ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach screenshots
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 0.7.6, main, commit SHA

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11, macOS 15, Ubuntu 24.04

  - type: input
    id: device
    attributes:
      label: Meshtastic device / transport
      placeholder: e.g. T-Echo over USB serial, COM7, /dev/ttyUSB0

  - type: textarea
    id: env
    attributes:
      label: Relevant configuration
      description: Include any relevant `.env` settings, redacting secrets
      render: shell

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 36 100 62" fill="none">
  <defs>
    <linearGradient id="wifiGrad" x1="0" y1="95" x2="100" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6f42c1"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="mGrad" x1="0" y1="95" x2="50" y2="5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6f42c1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="fGrad" x1="40" y1="95" x2="85" y2="5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
    <filter id="fGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- WiFi dot — subtle background -->
  <circle cx="50" cy="90" r="5" fill="url(#wifiGrad)" opacity="0.27"/>

  <!-- Arc 1 — R=16, pulses bottom first -->
  <path d="M 36.1,82 A 16 16 0 0 1 63.9,82"
        stroke="url(#wifiGrad)" stroke-width="5.5" stroke-linecap="round">
    <animate attributeName="opacity"
      values="0.1;0.23;0.1;0.1;0.1" keyTimes="0;0.2;0.4;0.7;1"
      dur="2.4s" begin="0s" repeatCount="indefinite"/>
  </path>

  <!-- Arc 2 — R=31, pulses second -->
  <path d="M 23.1,74.5 A 31 31 0 0 1 76.9,74.5"
        stroke="url(#wifiGrad)" stroke-width="5.5" stroke-linecap="round">
    <animate attributeName="opacity"
      values="0.1;0.1;0.23;0.1;0.1" keyTimes="0;0.2;0.4;0.6;1"
      dur="2.4s" begin="0s" repeatCount="indefinite"/>
  </path>

  <!-- Arc 3 — R=46, pulses last (top) -->
  <path d="M 10.2,67 A 46 46 0 0 1 89.8,67"
        stroke="url(#wifiGrad)" stroke-width="5.5" stroke-linecap="round">
    <animate attributeName="opacity"
      values="0.1;0.1;0.1;0.23;0.1" keyTimes="0;0.2;0.4;0.6;1"
      dur="2.4s" begin="0s" repeatCount="indefinite"/>
  </path>

  <!-- Dark backing behind MF -->
  <rect x="31.4" y="45.4" width="37.2" height="37.2" rx="5" fill="#0d1117" opacity="0.75" stroke="#6f42c1" stroke-width="0.75" stroke-opacity="0.5"/>

  <!-- MF: scaled to fit the middle band of the antenna -->
  <g transform="translate(36.5, 48.25) scale(0.370, 0.315)">
    <!-- M: x=0–50, y=5–95 -->
    <path d="M 0,95 L 0,5 L 10,5 L 25,55 L 40,5 L 50,5 L 50,95
             L 40,95 L 40,15 L 25,65 L 10,15 L 10,95 Z"
          fill="url(#mGrad)"/>
    <!-- F: x=40–85, y=5–95 -->
    <path d="M 40,5 L 73,5 L 73,15 L 50,15 L 50,45 L 63,45 L 63,55
             L 50,55 L 50,95 L 40,95 Z"
          fill="url(#fGrad)" filter="url(#fGlow)"/>
  </g>
</svg>
